apiVersion: v1
kind: ConfigMap
metadata:
  name: kepler-cfm
  namespace: system
data:
  # EXPOSE_COMPONENT_POWER: "false"
  EXPOSE_ESTIMATED_IDLE_POWER_METRICS: "true"
  MODEL_CONFIG: |
    NODE_COMPONENTS_ESTIMATOR=false
    NODE_TOTAL_ESTIMATOR=true
    NODE_TOTAL_TRAINER="rpi-model"
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: kepler-exporter
  namespace: system
spec:
  template:
    spec:
      # initContainers:
      # - name: config-setup
      #   image: alpine
      #   command: ['/bin/sh', '-c', 'echo Initializing...']
      #   args:
      #   - >
      #     echo "hello";
      #     echo "NODE_NAME: $NODE_NAME";
      #     ls -al /config/config;
      #     # mkdir -p /etc/kepler/kepler.config;
      #     # ls -al /etc/kepler/kepler.config;
      #     # if [ "$NODE_NAME" = "raspberrypi" ]; then
      #     #     cp /config/config/rpi.config/* /etc/kepler/kepler.config;
      #     # else
      #     #     cp /config/config/default.config/* /etc/kepler/kepler.config;
      #     # fi;
      #     # cat /etc/kepler/kepler.config/MODEL_CONFIG;
      #     ls -al /mnt
      #     cp /mnt/download/* 
      #   env:
      #   - name: NODE_NAME
      #     valueFrom:
      #       fieldRef:
      #         fieldPath: spec.nodeName
      #   resources:
      #     limits:
      #       cpu: "100m"
      #       memory: "128Mi"
      #   volumeMounts:
      #   - name: multi-cfm
      #     mountPath: /config
      #   - mountPath: /etc/kepler/kepler.config
      #     name: cfm
      #   - name: mnt
      #     mountPath: /mnt
      containers:
        - command:
            - /bin/sh
            - -c
          args:
            - until [ -e /tmp/estimator.sock ]; do sleep 1; done && /usr/bin/kepler -v=$(KEPLER_LOG_LEVEL) 
          volumeMounts:
            - mountPath: /tmp
              name: tmp
          name: kepler-exporter
          image: mengxue12/kepler:release-0.7.11-linux-2025102313
          imagePullPolicy: IfNotPresent
        - image: mengxue12/kepler_model_server:v0.7.11-2-20250403
          imagePullPolicy: IfNotPresent
          command: [python3]
          args: [-u, src/kepler_model/estimate/estimator.py]
          name: estimator
          volumeMounts:
            - name: cfm
              mountPath: /etc/kepler/kepler.config
              readOnly: true
            - mountPath: /tmp
              name: tmp
            - mountPath: /mnt
              name: mnt
      volumes:
        - emptyDir: {}
          name: tmp
        - name: mnt
          persistentVolumeClaim:
            claimName: kepler-pvc
