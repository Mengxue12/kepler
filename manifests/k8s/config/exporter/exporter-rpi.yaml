apiVersion: v1
kind: ConfigMap
metadata:
  name: kepler-cfm-rpi
  namespace: system
data:
  KEPLER_NAMESPACE: $(KEPLER_NAMESPACE)
  KEPLER_LOG_LEVEL: "8"
  PROMETHEUS_SCRAPE_INTERVAL: 3s
  METRIC_PATH: /metrics
  BIND_ADDRESS: 0.0.0.0:9102
  ENABLE_GPU: "false"
  ENABLE_QAT: "false"
  ENABLE_EBPF_CGROUPID: "true"
  EXPOSE_HW_COUNTER_METRICS: "true"
  EXPOSE_IRQ_COUNTER_METRICS: "true"
  EXPOSE_VM_METRICS: "false"
  EXPOSE_CGROUP_METRICS: "false"
  # ENABLE_PROCESS_METRICS: "true"
  CPU_ARCH_OVERRIDE: ""
  REDFISH_PROBE_INTERVAL_IN_SECONDS: "60"
  REDFISH_SKIP_SSL_VERIFY: "true"
  MODEL_CONFIG: |
    CONTAINER_COMPONENTS_ESTIMATOR=false
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: kepler-exporter-rpi
  namespace: system
spec:
  selector:
    matchLabels:
      app.kubernetes.io/component: exporter
      app.kubernetes.io/name: kepler-exporter
      kepler.sustainable-computing.io/variant: rpi
  template:
    metadata:
      labels:
        app.kubernetes.io/component: exporter
        app.kubernetes.io/name: kepler-exporter
        kepler.sustainable-computing.io/variant: rpi
    spec:
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: kubernetes.io/arch
                    operator: In
                    values:
                      - arm64
                      - arm
      tolerations:
        - effect: NoSchedule
          key: node-role.kubernetes.io/master
      dnsPolicy: ClusterFirstWithHostNet
      serviceAccountName: kepler-sa
      hostPID: true
      containers:
        - name: kepler-exporter
          image: kepler:latest
          imagePullPolicy: Always
          resources:
            requests:
              memory: 400Mi
              cpu: 100m
          securityContext:
            privileged: true
          command:
            - /bin/sh
            - -c
          args:
            - /usr/bin/kepler -v=$(KEPLER_LOG_LEVEL) -redfish-cred-file-path=/etc/redfish/redfish.csv
          ports:
            - containerPort: 9102
              name: http
          livenessProbe:
            failureThreshold: 5
            httpGet:
              path: /healthz
              port: 9102
              scheme: HTTP
            initialDelaySeconds: 10
            periodSeconds: 60
            successThreshold: 1
            timeoutSeconds: 10
          volumeMounts:
            - mountPath: /lib/modules
              name: lib-modules
              readOnly: true
            - mountPath: /sys
              name: tracing
              readOnly: true
            - mountPath: /proc
              name: proc
            - mountPath: /var/run
              name: var-run
            - name: cfm
              mountPath: /etc/kepler/kepler.config
              readOnly: true
            - name: redfish
              mountPath: /etc/redfish
              readOnly: true
          env:
            - name: NODE_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.hostIP
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
      volumes:
        - name: lib-modules
          hostPath:
            path: /lib/modules
            type: Directory
        - name: tracing
          hostPath:
            path: /sys
            type: Directory
        - name: proc
          hostPath:
            path: /proc
            type: Directory
        - name: var-run
          hostPath:
            path: /var/run
            type: Directory
        - name: cfm
          configMap:
            name: kepler-cfm-rpi
        - name: redfish
          secret:
            secretName: redfish
